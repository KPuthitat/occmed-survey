<script type="module">
import { NYHA_CLASSES, CCS_CLASSES, CAD_LEVELS } from './engine.js';

import { mountPageKit } from '/shared/pagekit.js';
import { CAD_EXAMPLES } from './examples.js';

mountClassifier({

    { key: 'angio', label: 'การฉีดสีหลอดเลือดหัวใจ (angiography) / echo' },
  ],
  refs: [
    { title: 'ดูเกณฑ์ NYHA functional class I–IV (ตาราง 10-1)', rows: NYHA_CLASSES.map(n => ({ cls: n.cls, text: n.text })) },
    { title: 'ดูเกณฑ์ CCS angina class I–IV (ตาราง 10-5)', rows: CCS_CLASSES.map(n => ({ cls: n.cls, text: n.text })) },

  examplesOpts: {
    title: 'ดูโจทย์ตัวอย่าง + วิธีทำ (จากคู่มือ บทที่ 10)',
    source: 'ที่มา: คู่มือการประเมินการสูญเสียสมรรถภาพอย่างถาวรทางกายและจิต ฉบับจัดทำ 4 (พ.ศ. 2564) · สำนักงานกองทุนเงินทดแทน สำนักงานประกันสังคม · บทที่ 10',

  mountPageKit,
